name: Build & Push Sandbox Images

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile.light"
      - "Dockerfile.full"
      - ".github/workflows/sandbox-image.yml"
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        variant: [light, full]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Tag
        env:
          REPO_LOWER: ${{ github.repository_owner }}/purrcat-sandbox
        run: |
          REPO_LOWER="$(echo "$REPO_LOWER" | tr '[:upper:]' '[:lower:]')"
          DOCKERFILE="Dockerfile.${{ matrix.variant }}"
          IMAGE="ghcr.io/${REPO_LOWER}:${{ matrix.variant }}"
          SHA_IMAGE="ghcr.io/${REPO_LOWER}:${{ matrix.variant }}-${{ github.sha }}"

          docker build \
            -f "$DOCKERFILE" \
            -t "$IMAGE" \
            -t "$SHA_IMAGE" \
            --build-arg APT_MIRROR="deb.debian.org" \
            .

      - name: Push to ghcr.io
        env:
          REPO_LOWER: ${{ github.repository_owner }}/purrcat-sandbox
        run: |
          REPO_LOWER="$(echo "$REPO_LOWER" | tr '[:upper:]' '[:lower:]')"
          IMAGE="ghcr.io/${REPO_LOWER}:${{ matrix.variant }}"
          SHA_IMAGE="ghcr.io/${REPO_LOWER}:${{ matrix.variant }}-${{ github.sha }}"
          docker push "$IMAGE"
          docker push "$SHA_IMAGE"
