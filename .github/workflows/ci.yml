name: PurrCat CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      python_changed: ${{ steps.detect.outputs.python_changed }}
      ui_changed: ${{ steps.detect.outputs.ui_changed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Detect changed scopes
        id: detect
        run: |
          set -euo pipefail
          
          if [ "${{ github.event_name }}" = "push" ]; then
            BASE="${{ github.event.before }}"
          else
            BASE="${{ github.event.pull_request.base.sha }}"
          fi
          
          if ! git cat-file -e "$BASE^{commit}" 2>/dev/null; then
            echo "Warning: Base commit $BASE not found, assuming full rebuild"
            echo "python_changed=true" >> "$GITHUB_OUTPUT"
            echo "ui_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          
          CHANGED_FILES=$(git diff --name-only "$BASE" HEAD)
          
          # Refactored: Replaced environment.yml with pyproject.toml and uv.lock for uv-based tracking
          if echo "$CHANGED_FILES" | grep -qE "^(src/|main\.py|pyproject\.toml|uv\.lock|scripts/|tui/)"; then
            echo "python_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "python_changed=false" >> "$GITHUB_OUTPUT"
          fi
          
          if echo "$CHANGED_FILES" | grep -qE "^ui/"; then
            echo "ui_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "ui_changed=false" >> "$GITHUB_OUTPUT"
          fi

  ui-check-and-build:
    name: UI Check & Build
    needs: [preflight]
    if: needs.preflight.outputs.ui_changed == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install UI Dependencies
        working-directory: ui
        run: npm ci

      - name: UI Lint
        working-directory: ui
        run: npm run lint

      - name: Build UI
        working-directory: ui
        run: npm run build

  security-check:
    name: Security Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Detect Private Keys
        run: |
          find . -type f \( -name "*.py" -o -name "*.json" -o -name "*.yml" -o -name "*.yaml" \) \
            -not -path "./.git/*" -not -path "./ui/node_modules/*" \
            -exec grep -l -E "(BEGIN [A-Za-z ]+KEY|private-key|api[_-]key|secret[_-]key)" {} \; || echo "No secrets found in code files"

  ci-summary:
    name: CI Summary
    needs: [preflight, ui-check-and-build, security-check]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Check CI Results
        env:
          UI_RESULT: ${{ needs.ui-check-and-build.result }}
          SECURITY_RESULT: ${{ needs.security-check.result }}
        run: |
          set -euo pipefail
          
          echo "=== CI Summary ==="
          echo "UI Check & Build: $UI_RESULT"
          echo "Security Check: $SECURITY_RESULT"
          
          FAILED_JOBS=()
          
          if [ "$UI_RESULT" = "failure" ] && [ "${{ needs.preflight.outputs.ui_changed }}" = "true" ]; then FAILED_JOBS+=("ui-check-and-build"); fi
          if [ "$SECURITY_RESULT" = "failure" ]; then FAILED_JOBS+=("security-check"); fi
          
          if [ ${#FAILED_JOBS[@]} -gt 0 ]; then
            echo "::error::The following jobs failed: ${FAILED_JOBS[*]}"
            exit 1
          fi
          
          echo "All CI checks passed!"
