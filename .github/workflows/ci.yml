name: CatInCup CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash -el {0}

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Conda Environment
      uses: conda-incubator/setup-miniconda@v3
      with:
        activate-environment: CatInCup
        environment-file: environment.yml
        python-version: '3.10'
        auto-activate-base: false
        cache-environment: true

    - name: Run Backend Checks
      run: |
        python --version

