name: PurrCat CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash -el {0}

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Conda Environment
      uses: conda-incubator/setup-miniconda@v3
      with:
        activate-environment: CatInCup
        environment-file: environment.yml
        python-version: '3.10'
        auto-activate-base: false
        cache-environment: true

    - name: Install Additional Linting Tools
      run: |
        pip install ruff pyflakes

    - name: Python Syntax Check
      run: |
        python -m py_compile main.py
        echo "✅ main.py 语法检查通过"
        python -m compileall -q -f src/ || true
        echo "✅ src/ 目录语法检查完成"

    - name: Ruff Lint Check
      run: |
        ruff check src/ --ignore E501 --output-format concise || echo "⚠️ 部分 lint 警告可忽略"
        echo "✅ 代码风格检查完成"

    - name: Module Import Test
      run: |
        python test/test_imports.py

