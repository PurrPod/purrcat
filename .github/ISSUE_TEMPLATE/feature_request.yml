name: Feature Request
description: Request a new feature for PurrCat
title: "[Feature] "
labels: ["type: feature"]
assignees: []

body:
  - type: textarea
    id: description
    attributes:
      label: Describe the feature
      description: A clear and concise description of the feature you want to add.
    validations:
      required: true

  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: Explain why this feature would be useful
      placeholder: "This feature would help me..."
    validations:
      required: true

  - type: textarea
    id: proposed
    attributes:
      label: Proposed implementation
      description: If you have ideas about how this could be implemented, share them here.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe any alternative solutions or features you've considered.

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add any other context or screenshots about the feature request here.
