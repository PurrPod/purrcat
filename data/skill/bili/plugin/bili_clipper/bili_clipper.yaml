bili_clipper:
  name: B站智能剪辑器
  desc: 下载B站视频、提取时间戳字幕，并支持精准物理裁剪。
  dir_path: plugin_collection/bili_clipper/
  functions:
    download_and_transcribe:
      type: function
      function:
        name: download_and_transcribe
        description: 下载B站视频并进行语音转文字，返回带有完整时间戳的字幕文本以及视频的本地临时路径。
        parameters:
          type: object
          properties:
            url:
              type: string
              description: B站视频的有效链接
          required:
            - url
    trim_video:
      type: function
      function:
        name: trim_video
        description: 根据给定的时间戳，从本地视频文件中裁剪出特定片段。
        parameters:
          type: object
          properties:
            video_path:
              type: string
              description: 本地视频的绝对路径（由 download_and_transcribe 提供）
            start_time:
              type: string
              description: 开始时间，格式必须为 mm:ss
            end_time:
              type: string
              description: 结束时间，格式必须为 mm:ss
            output_name:
              type: string
              description: 期望输出的文件名（不需要后缀）
          required:
            - video_path
            - start_time
            - end_time
            - output_name