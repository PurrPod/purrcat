# LLM 模型配置（名字格式是->厂商:模型名称，厂商部分可以随意调整用来区分不同的api-key，只要含厂商名字即可）
models:
  "[1]openai:deepseek-chat":
    api_key: "your-api-key"
    base_url: "https://api.deepseek.com/v1"
    description: "LLM worker1"
  "[&]openai:deepseek-chat":
    api_key: "your-api-key"
    base_url: "https://api.deepseek.com/v1"
    description: "LLM Judger"
  "openai:qwen3-vl-plus":
    api_key: "your-api-key"
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    description: "VLM worker"

