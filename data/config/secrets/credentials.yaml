# ============================================
# 凭据配置（API Keys & Tokens）
# 此文件包含敏感信息，请勿提交到版本控制
# ============================================

# 模型 API 配置
models:
  openai:deepseek-v4-flash:
    api_keys:
      - write_your_api_key1_here
      - write_your_api_key2_here_but_it_is_not_necessary
    base_url: https://api.deepseek.com/v1
    description: LLM worker
    limits:
      rpm: 60          # 每分钟请求数上限
      tpm: 1000000     # 每分钟 Token 数上限
      concurrency: 3   # 最大并发数
      max_token: 500000 # 记忆窗口 Token 上限，达到后触发记忆归档
  openai:qwen3-vl-plus:
    api_keys:
      - write_your_api_key_here
    base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
    description: LLM worker 2
    limits:
      rpm: 30
      tpm: 500000
      concurrency: 2
      max_token: 200000

# 飞书配置（无延迟对话信道）
feishu:
  app_id: your_app_id
  app_secret: your_app_secret
  chat_id: your_chat_id

# Web API 配置
web_api:
  tavily_api_key: your-api-key
