# ============================================
# MCP 服务器配置
# ============================================

mcp_servers: # 这几个是默认推荐安装的 MCP 服务器
  playwright:
    command: "npx"
    args:
      - "@playwright/mcp@latest"
      - "--user-data-dir=.buffer/playwright"
      - "--output-dir=.buffer/screenshots"
    idle_timeout: 600
  github:
    command: "npx"
    args:
      - "-y"
      - "@modelcontextprotocol/server-github"
    env:
      GITHUB_PERSONAL_ACCESS_TOKEN: "your_github_token"

