database:
  name: Database
  desc: 提供对本地数据库的检索及上下文扩展。
  dir_path: plugin_collection/database/
  functions:
    list_databases:
      type: function
      function:
        name: database__list_databases
        description: List all available databases on disk. Use this first if you do
          not know which database to search.
        parameters:
          type: object
          properties: {}
          required: []
    rag_search:
      type: function
      function:
        name: database__rag_search
        description: Perform RAG search on specific local databases. You MUST provide
          the target_dbs parameter.
        parameters:
          type: object
          properties:
            query:
              type: string
              description: The user's question or search keywords.
            target_dbs:
              type: array
              items:
                type: string
              description: List of database names to search (e.g., ['demo']). Use
                list_databases if unsure.
            top_k:
              type: integer
              description: Number of relevant text chunks to return. Default is 3.
          required:
          - query
          - target_dbs
    expand_database_context:
      type: function
      function:
        name: database__expand_database_context
        description: Expand the text context around a specific matched chunk in a
          database.
        parameters:
          type: object
          properties:
            db_name:
              type: string
            source:
              type: string
            center_chunk_id:
              type: integer
            window:
              type: integer
              description: Number of chunks before and after. Default 1.
          required:
          - db_name
          - source
          - center_chunk_id
filesystem:
  name: 文件系统
  desc: 提供对本地文件系统的操作，包括读写、删除、搜索等，具备沙箱保护
  dir_path: plugin_collection/filesystem/
  functions:
    write_text_file:
      type: function
      function:
        name: filesystem__write_text_file
        description: Write content to a text file. Must be within the sandbox whitelist.
        parameters:
          type: object
          properties:
            path:
              type: string
              description: The absolute path of the file to write.
            content:
              type: string
              description: The content to write to the file.
          required:
          - path
          - content
    delete_file:
      type: function
      function:
        name: filesystem__delete_file
        description: Delete a file or directory. Must be within the sandbox whitelist.
        parameters:
          type: object
          properties:
            path:
              type: string
              description: The absolute path of the file or directory to delete.
          required:
          - path
    parse_document:
      type: function
      function:
        name: filesystem__parse_document
        description: Parse and extract text from rich/binary documents (e.g., PDF,
          DOCX, XLSX, PPTX) using MarkItDown. DO NOT use this for plain text or CSV
          files (use read_file_lines instead).
        parameters:
          type: object
          properties:
            path:
              type: string
              description: The absolute path of the document file to parse.
          required:
          - path
    read_file_lines:
      type: function
      function:
        name: filesystem__read_file_lines
        description: Read specific lines from a file.
        parameters:
          type: object
          properties:
            path:
              type: string
              description: The absolute path of the file.
            start:
              type: integer
              description: The starting line number (1-based).
            end:
              type: integer
              description: The ending line number (inclusive).
          required:
          - path
          - start
          - end
    search_in_file:
      type: function
      function:
        name: filesystem__search_in_file
        description: Search for a keyword in a file.
        parameters:
          type: object
          properties:
            path:
              type: string
              description: The absolute path of the file.
            keyword:
              type: string
              description: The keyword to search for.
            limit:
              type: integer
              description: Maximum number of matches to return (default 20).
          required:
          - path
          - keyword
    replace_file_lines:
      type: function
      function:
        name: filesystem__replace_file_lines
        description: Replace specific lines in a file with new code.
        parameters:
          type: object
          properties:
            path:
              type: string
              description: The absolute path of the file.
            start:
              type: integer
              description: The starting line number (1-based).
            end:
              type: integer
              description: The ending line number (inclusive).
            new_code:
              type: string
              description: The new content to replace the specified lines.
          required:
          - path
          - start
          - end
          - new_code
    list_special_directories:
      type: function
      function:
        name: filesystem__list_special_directories
        description: List all special directories including sandbox, skill and so
          on.
        parameters:
          type: object
          properties: {}
          required: []
    list_file_in_dir:
      type: function
      function:
        name: filesystem__list_file_in_dir
        description: List files and directories within a given path.
        parameters:
          type: object
          properties:
            path:
              type: string
              description: The absolute path of the directory to list.
          required:
          - path
feishu:
  name: 飞书插件
  desc: 提供向指定的飞书对话框发送消息的功能。
  dir_path: plugin_collection/feishu/
  functions:
    send_feishu_message:
      type: function
      function:
        name: feishu__send_feishu_message
        description: 给飞书发送文本消息。
        parameters:
          type: object
          properties:
            text:
              type: string
              description: 消息的纯文本内容
            mode:
              type: string
              description: 发送完消息你准备开启下一个任务还是继续当前任务，继续当前任务则填continue，否则填next
          required:
          - text
          - mode
manager:
  name: 项目管理插件
  desc: 启动子项目并管理子项目提出的提问及回答逻辑，也是调度自身工具的接口
  dir_path: plugin_collection/manager/
  functions:
    add_project:
      type: function
      function:
        name: manager__add_project
        description: 启动一个新的后台子项目。适合复杂任务和项目开发
        parameters:
          type: object
          properties:
            name:
              type: string
              description: 项目名称
            prompt:
              type: string
              description: 项目的核心任务描述
            core:
              type: string
              description: 该项目分配的经理代号，如“[2]openai:deepseek-chat”
            check_mode:
              type: boolean
              description: 是否开启分步检查模式，默认为 false。
              default: false
            refine_mode:
              type: boolean
              description: 是否开启提示词优化模式，开启的话工人将会和你沟通需求，默认为 false。
              default: false
            judge_mode:
              type: boolean
              description: 是否开启子任务质检模式，默认为 false。
              default: false
          required:
          - name
          - prompt
          - core
    answer:
      type: function
      function:
        name: manager__answer
        description: 回答来自特定子项目的提问，推动异步项目继续执行。
        parameters:
          type: object
          properties:
            project_id:
              type: string
              description: 子项目的唯一 ID
            answer_text:
              type: string
              description: 你针对提问给出的回答或决策内容
          required:
          - project_id
          - answer_text
    check_pending_questions:
      type: function
      function:
        name: manager__check_pending_questions
        description: 查看当前所有正在等待回答问题的子项目列表。
        parameters:
          type: object
          properties: {}
          required: []
    add_simple_task:
      type: function
      function:
        name: manager__add_simple_task
        description: 启动一个简单的后台子任务。
        parameters:
          type: object
          properties:
            title:
              type: string
              description: 任务标题
            desc:
              type: string
              description: 任务描述
            deliverable:
              type: string
              description: 任务交付物
            worker:
              type: string
              description: 执行任务的工人
            judger:
              type: string
              description: 质检任务的工人
            available_tools:
              type: array
              items:
                type: string
              description: 可用的工具列表
            prompt:
              type: string
              description: 系统提示
            judge_mode:
              type: boolean
              description: 是否开启质检模式
            task_histories:
              type: string
              description: 任务历史
          required:
          - title
          - desc
          - deliverable
          - worker
          - judger
          - available_tools
          - prompt
    list_tool:
      type: function
      function:
        name: manager__list_tool
        description: 获取当前所有可派给工人使用的工具及其描述的清单。
        parameters:
          type: object
          properties: {}
          required: []
    fetch_tool:
      type: function
      function:
        name: manager__fetch_tool
        description: 挑选下一步行动需要用到的工具（清空旧工具，仅保留新请求的工具）。
        parameters:
          type: object
          properties:
            tool_name_list:
              type: array
              items:
                type: string
              description: 需要保留的工具名称列表
          required:
          - tool_name_list
    list_worker:
      type: function
      function:
        name: manager__list_worker
        description: 获取当前所有可用的工人及其描述的清单。
        parameters:
          type: object
          properties: {}
          required: []
schedule:
  name: 智能助手工具
  desc: 提供日程安排和闹钟管理功能。
  dir_path: plugin_collection/schedule/
  functions:
    add_schedule:
      type: function
      function:
        name: schedule__add_schedule
        description: 添加跨天/跨月的日程。时间格式推荐 YYYY-MM-DD HH:MM
        parameters:
          type: object
          properties:
            title:
              type: string
              description: 日程标题
            start_time:
              type: string
              description: 开始时间 (YYYY-MM-DD HH:MM)
            end_time:
              type: string
              description: 结束时间 (YYYY-MM-DD HH:MM)
            description:
              type: string
              description: 补充描述
          required:
          - title
          - start_time
          - end_time
    delete_schedule:
      type: function
      function:
        name: schedule__delete_schedule
        description: 删除日程
        parameters:
          type: object
          properties:
            schedule_id:
              type: string
              description: 日程 ID
          required:
          - schedule_id
    update_schedule:
      type: function
      function:
        name: schedule__update_schedule
        description: 修改日程
        parameters:
          type: object
          properties:
            schedule_id:
              type: string
              description: 日程 ID
            title:
              type: string
              description: 新标题
            start_time:
              type: string
              description: 新开始时间
            end_time:
              type: string
              description: 新结束时间
            description:
              type: string
              description: 新描述
          required:
          - schedule_id
    get_schedules:
      type: function
      function:
        name: schedule__get_schedules
        description: 获取所有日程，或者根据特定日期 (YYYY-MM-DD) 检索
        parameters:
          type: object
          properties:
            date_str:
              type: string
              description: 指定日期 (可选)
          required: []
    add_cron:
      type: function
      function:
        name: schedule__add_cron
        description: 添加闹钟
        parameters:
          type: object
          properties:
            title:
              type: string
              description: 闹钟标题
            trigger_time:
              type: string
              description: 触发时间 (HH:MM)
            repeat_rule:
              type: string
              description: '重复规则: ''none'', ''everyday'', ''weekly_1''...''weekly_7'''
          required:
          - title
          - trigger_time
    delete_cron:
      type: function
      function:
        name: schedule__delete_cron
        description: 删除闹钟
        parameters:
          type: object
          properties:
            cron_id:
              type: string
              description: 闹钟 ID
          required:
          - cron_id
    update_cron:
      type: function
      function:
        name: schedule__update_cron
        description: 修改闹钟
        parameters:
          type: object
          properties:
            cron_id:
              type: string
              description: 闹钟 ID
            title:
              type: string
              description: 新标题
            trigger_time:
              type: string
              description: 新触发时间
            repeat_rule:
              type: string
              description: 新重复规则
            active:
              type: boolean
              description: 是否激活
          required:
          - cron_id
    get_crons:
      type: function
      function:
        name: schedule__get_crons
        description: 获取设定的所有闹钟
        parameters:
          type: object
          properties: {}
          required: []
web:
  name: 网络搜索工具
  desc: 提供网页搜索和网页内容提取功能，结果将自动保存至 buffer 文件夹。
  dir_path: plugin_collection/web/
  functions:
    web_search:
      type: function
      function:
        name: web__web_search
        description: 搜索互联网内容并获取相关链接及摘要。结果将以 Markdown 格式保存至 buffer 文件夹。
        parameters:
          type: object
          properties:
            query:
              type: string
              description: 搜索关键词
            max_results:
              type: integer
              description: 返回的最大结果数量（默认为5）
          required:
          - query
    fetch_web_content:
      type: function
      function:
        name: web__fetch_web_content
        description: 抓取指定 URL 的网页内容。结果将以 Markdown 格式保存至 buffer 文件夹。
        parameters:
          type: object
          properties:
            url:
              type: string
              description: 网页的完整 URL
          required:
          - url
mcptool:
  name: MCP 服务调用器
  desc: 提供外部 MCP 工具，仅支持白名单内MCP工具
  dir_path: plugin_collection/mini_github/
  functions:
    get_mcp_menu:
      type: function
      function:
        name: mcptool__get_mcp_menu
        description: 获取当前可用的所有 MCP 外部服务菜单和工具简述
        parameters:
          type: object
          properties: {}
    get_tool_details:
      type: function
      function:
        name: mcptool__get_tool_details
        description: 获取特定 MCP 工具的详细参数说明 (JSON Schema)
        parameters:
          type: object
          properties:
            server_name:
              type: string
              description: MCP Server 的名称
            tool_name:
              type: string
              description: 工具的名称
          required:
          - server_name
          - tool_name
    call_mcp_tool:
      type: function
      function:
        name: mcptool__call_mcp_tool
        description: 执行特定的 MCP 工具，需要传入严格按照 mcptool__get_tool_details 的参数格式
        parameters:
          type: object
          properties:
            server_name:
              type: string
            tool_name:
              type: string
            arguments:
              type: string
              description: 工具所需的 JSON 格式的参数字符串
          required:
          - server_name
          - tool_name
          - arguments
multimodal:
  name: 多模态插件
  desc: 提供图像/视频/音频生成及识别的多模态工具。
  dir_path: plugin_collection/multimodal/
  functions:
    generate_image:
      type: function
      function:
        name: multimodal__generate_image
        description: 根据提示生成图片，并保存到 data/buffer（或自定义输出目录）。
        parameters:
          type: object
          properties:
            prompt:
              type: string
              description: 用于生成图片的文本提示。
            output_dir:
              type: string
              description: 可选：自定义输出目录（默认 data/buffer）。
          required:
          - prompt
    image_to_text:
      type: function
      function:
        name: multimodal__image_to_text
        description: 对一张或多张图片进行视觉识别并返回文本结果。
        parameters:
          type: object
          properties:
            prompt:
              type: string
              description: 用于指导识别的文本提示。
            ref_path:
              type: array
              items:
                type: string
              description: 图片文件路径列表，或者单个路径字符串。
          required:
          - prompt
          - ref_path
    generate_video:
      type: function
      function:
        name: multimodal__generate_video
        description: 根据提示生成视频，并保存到 data/buffer（或自定义输出目录）。
        parameters:
          type: object
          properties:
            prompt:
              type: string
              description: 用于生成视频的文本提示。
            output_dir:
              type: string
              description: 可选：自定义输出目录（默认 data/buffer）。
          required:
          - prompt
    video_to_text:
      type: function
      function:
        name: multimodal__video_to_text
        description: 从视频中抽帧并使用视觉模型进行文本描述。
        parameters:
          type: object
          properties:
            prompt:
              type: string
              description: 用于指导识别的文本提示。
            ref_path:
              type: array
              items:
                type: string
              description: 视频文件路径列表，或者单个路径字符串。
          required:
          - prompt
          - ref_path
    generate_audio:
      type: function
      function:
        name: multimodal__generate_audio
        description: 根据文本提示生成音频，并保存到本地。
        parameters:
          type: object
          properties:
            prompt:
              type: string
              description: 用于生成音频的文本提示。
            output_dir:
              type: string
              description: 可选：自定义输出目录（默认当前目录）。
          required:
          - prompt
    audio_to_text:
      type: function
      function:
        name: multimodal__audio_to_text
        description: 将音频转录为文本。
        parameters:
          type: object
          properties:
            prompt:
              type: string
              description: 用于引导转录的文本提示（可选）。
            ref_path:
              type: array
              items:
                type: string
              description: 音频文件路径列表，或者单个路径字符串。
          required:
          - prompt
          - ref_path
