feishu:
  name: "飞书插件"
  desc: "提供向指定的飞书对话框发送消息的功能。"
  dir_path: plugin_collection/feishu/
  functions:
    send_feishu_message:
      type: function
      function:
        name: "send_feishu_message"
        description: "给飞书发送文本消息。"
        parameters:
          type: "object"
          properties:
            text:
              type: "string"
              description: "消息的纯文本内容"
            mode:
              type: "string"
              description: "发送完消息你准备开启下一个任务还是继续当前任务，继续当前任务则填continue，否则填next"
          required: ["text", "mode"]
