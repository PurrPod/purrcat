shell:
  name: "Shell 工具集"
  desc: "提供一个具备持久化能力的 Shell 环境，支持执行系统命令、脚本，并具备跨调用的环境一致性（如 PWD, 环境变量）。内置高危命令拦截和交互式命令过滤，确保系统安全。"
  dir_path: plugin_collection/shell/

  functions:
    execute_command:
      type: function
      function:
        name: "execute_command"
        description: "在指定的 Shell 会话中执行命令。如果会话不存在会自动创建。支持跨调用持久化（如环境变量、当前目录）。"
        parameters:
          type: "object"
          properties:
            command:
              type: "string"
              description: "要执行的 Shell 命令字符串。"
            session_id:
              type: "string"
              description: "Shell 会话 ID，默认为 'default'。"
            timeout:
              type: "integer"
              description: "命令执行超时时间（秒），默认为 300。"
          required: ["command"]

    close_shell:
      type: function
      function:
        name: "close_shell"
        description: "关闭并释放指定的 Shell 会话，释放相关系统资源（如进程和线程）。"
        parameters:
          type: "object"
          properties:
            session_id:
              type: "string"
              description: "要关闭的 Shell 会话 ID，默认为 'default'。"
          required: []
