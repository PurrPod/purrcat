shell:
  # 插件基础信息
  name: "Shell 工具集"
  desc: "提供一个具备持久化能力的 Shell 环境，支持执行系统命令、脚本，并具备跨调用的环境一致性（如 PWD, 环境变量）。内置高危命令拦截和交互式命令过滤，确保系统安全。"
  dir_path: plugin_collection/shell/
  # 工具函数列表
  functions:
    run_command:
      type: function
      function:
        name: "run_command"
        description: "执行 Shell 命令（严禁执行删除沙盒外文件等危险指令）。支持跨调用持久化（如环境变量、当前目录）。完成任务后需手动close"
        parameters:
          type: "object"
          properties:
            command:
              type: "string"
              description: "要执行的 Shell 命令字符串。"
          required: ["command"]
    close_shell:
      type: function
      function:
        name: "close_shell"
        description: "关闭当前的持久化 Shell 会话并释放相关系统资源（如进程和线程）。"
        parameters:
          type: "object"
          properties: {}
          required: []
