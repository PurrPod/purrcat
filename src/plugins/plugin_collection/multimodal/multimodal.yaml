multimodal:
  name: "多模态插件"
  desc: "提供图像/视频/音频生成及识别的多模态工具。"
  dir_path: plugin_collection/multimodal/
  functions:
    generate_image:
      type: function
      function:
        name: "multimodal__generate_image"
        description: "根据提示生成图片，并保存到 data/buffer（或自定义输出目录）。"
        parameters:
          type: object
          properties:
            prompt:
              type: string
              description: "用于生成图片的文本提示。"
            output_dir:
              type: string
              description: "可选：自定义输出目录（默认 data/buffer）。"
          required:
            - prompt
    image_to_text:
      type: function
      function:
        name: "multimodal__image_to_text"
        description: "对一张或多张图片进行视觉识别并返回文本结果。"
        parameters:
          type: object
          properties:
            prompt:
              type: string
              description: "用于指导识别的文本提示。"
            ref_path:
              type: array
              items:
                type: string
              description: "图片文件路径列表，或者单个路径字符串。"
          required:
            - prompt
            - ref_path
    generate_video:
      type: function
      function:
        name: "multimodal__generate_video"
        description: "根据提示生成视频，并保存到 data/buffer（或自定义输出目录）。"
        parameters:
          type: object
          properties:
            prompt:
              type: string
              description: "用于生成视频的文本提示。"
            output_dir:
              type: string
              description: "可选：自定义输出目录（默认 data/buffer）。"
          required:
            - prompt
    video_to_text:
      type: function
      function:
        name: "multimodal__video_to_text"
        description: "从视频中抽帧并使用视觉模型进行文本描述。"
        parameters:
          type: object
          properties:
            prompt:
              type: string
              description: "用于指导识别的文本提示。"
            ref_path:
              type: array
              items:
                type: string
              description: "视频文件路径列表，或者单个路径字符串。"
          required:
            - prompt
            - ref_path
    generate_audio:
      type: function
      function:
        name: "multimodal__generate_audio"
        description: "根据文本提示生成音频，并保存到本地。"
        parameters:
          type: object
          properties:
            prompt:
              type: string
              description: "用于生成音频的文本提示。"
            output_dir:
              type: string
              description: "可选：自定义输出目录（默认当前目录）。"
          required:
            - prompt
    audio_to_text:
      type: function
      function:
        name: "multimodal__audio_to_text"
        description: "将音频转录为文本。"
        parameters:
          type: object
          properties:
            prompt:
              type: string
              description: "用于引导转录的文本提示（可选）。"
            ref_path:
              type: array
              items:
                type: string
              description: "音频文件路径列表，或者单个路径字符串。"
          required:
            - prompt
            - ref_path
