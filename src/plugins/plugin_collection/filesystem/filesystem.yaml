filesystem:
  # 插件基础信息
  name: "文件系统"
  desc: "提供对老板本地文件系统的操作（也可通过修改映射目录来直接修改沙盒环境），包括读写、删除、搜索等，具备沙箱保护"
  dir_path: plugin_collection/filesystem/
  # 工具函数列表（对齐DeepSeek/OpenAI function规范）
  functions:
    write_text_file:
      type: function
      function:
        name: "write_text_file"
        description: "Write content to a text file. Must be within the sandbox whitelist."
        parameters:
          type: "object"
          properties:
            path:
              type: "string"
              description: "The absolute path of the file to write."
            content:
              type: "string"
              description: "The content to write to the file."
          required: ["path", "content"]
    delete_file:
      type: function
      function:
        name: "delete_file"
        description: "Delete a file or directory. Must be within the sandbox whitelist."
        parameters:
          type: "object"
          properties:
            path:
              type: "string"
              description: "The absolute path of the file or directory to delete."
          required: ["path"]
    parse_document:
      type: function
      function:
        name: "parse_document"
        description: "Parse and extract text from rich/binary documents (e.g., PDF, DOCX, XLSX, PPTX) using MarkItDown. DO NOT use this for plain text or CSV files (use read_file_lines instead)."
        parameters:
          type: "object"
          properties:
            path:
              type: "string"
              description: "The absolute path of the document file to parse."
          required: [ "path" ]
    read_file_lines:
      type: function
      function:
        name: "read_file_lines"
        description: "Read specific lines from a file. Supports reading lines from start to end (inclusive). Returns line numbers with content. Limited to 5MB files and MAX_READ_WINDOW lines."
        parameters:
          type: "object"
          properties:
            path:
              type: "string"
              description: "The absolute path of the file."
            start:
              type: "integer"
              description: "The starting line number (1-based)."
            end:
              type: "integer"
              description: "The ending line number (inclusive)."
          required: ["path", "start", "end"]
    search_in_file:
      type: function
      function:
        name: "search_in_file"
        description: "Search for a keyword in a file."
        parameters:
          type: "object"
          properties:
            path:
              type: "string"
              description: "The absolute path of the file."
            keyword:
              type: "string"
              description: "The keyword to search for."
            limit:
              type: "integer"
              description: "Maximum number of matches to return (default 20)."
          required: ["path", "keyword"]
    replace_file_lines:
      type: function
      function:
        name: "replace_file_lines"
        description: "Replace specific lines in a file with new code."
        parameters:
          type: "object"
          properties:
            path:
              type: "string"
              description: "The absolute path of the file."
            start:
              type: "integer"
              description: "The starting line number (1-based)."
            end:
              type: "integer"
              description: "The ending line number (inclusive)."
            new_code:
              type: "string"
              description: "The new content to replace the specified lines."
          required: ["path", "start", "end", "new_code"]

    list_file_in_dir:
      type: function
      function:
        name: "list_file_in_dir"
        description: "List files and directories within a given path."
        parameters:
          type: "object"
          properties:
            path:
              type: "string"
              description: "The absolute path of the directory to list."
          required: ["path"]
    copy_item_to:
      type: function
      function:
        name: "copy_item_to"
        description: "Copy files from host system to virtual machine directory. Host file paths are copied to the specified VM directory (must start with /agent_vm/). Files are automatically renamed if they would overwrite existing files."
        parameters:
          type: "object"
          properties:
            host_file_paths:
              type: "array"
              items:
                type: "string"
              description: "List of absolute file paths on the host system to copy."
            vm_dir_path:
              type: "string"
              description: "Virtual machine directory path, must start with /agent_vm/ (e.g., /agent_vm/shared)."
          required: ["host_file_paths", "vm_dir_path"]
