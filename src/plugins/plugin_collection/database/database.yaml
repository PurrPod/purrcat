database:
  name: "Database"
  desc: "提供对本地数据库的检索及上下文扩展。"
  dir_path: plugin_collection/database/
  functions:
    list_databases:
      type: function
      function:
        name: "list_databases"
        description: "List all available databases on disk. Use this first if you do not know which database to search."
        parameters:
          type: "object"
          properties: {}
          required: []
          
    rag_search:
      type: function
      function:
        name: "rag_search"
        description: "Perform RAG search on specific local databases. You MUST provide the target_dbs parameter."
        parameters:
          type: "object"
          properties:
            query:
              type: "string"
              description: "The user's question or search keywords."
            target_dbs:
              type: "array"
              items:
                type: "string"
              description: "List of database names to search (e.g., ['demo']). Use list_databases if unsure."
            top_k:
              type: "integer"
              description: "Number of relevant text chunks to return. Default is 3."
          required: ["query", "target_dbs"]
          
    expand_database_context:
      type: function
      function:
        name: "expand_database_context"
        description: "Expand the text context around a specific matched chunk in a database."
        parameters:
          type: "object"
          properties:
            db_name:
              type: "string"
            source:
              type: "string"
            center_chunk_id:
              type: "integer"
            window:
              type: "integer"
              description: "Number of chunks before and after. Default 1."
          required: ["db_name", "source", "center_chunk_id"]
