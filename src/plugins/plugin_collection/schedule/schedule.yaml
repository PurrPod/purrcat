schedule:
  name: "智能助手工具"
  desc: "提供日程安排和闹钟管理功能。"
  dir_path: plugin_collection/schedule/

  functions:
    add_schedule:
      type: function
      function:
        name: "schedule__add_schedule"
        description: "添加跨天/跨月的日程。时间格式推荐 YYYY-MM-DD HH:MM"
        parameters:
          type: "object"
          properties:
            title:
              type: "string"
              description: "日程标题"
            start_time:
              type: "string"
              description: "开始时间 (YYYY-MM-DD HH:MM)"
            end_time:
              type: "string"
              description: "结束时间 (YYYY-MM-DD HH:MM)"
            description:
              type: "string"
              description: "补充描述"
          required: ["title", "start_time", "end_time"]

    delete_schedule:
      type: function
      function:
        name: "schedule__delete_schedule"
        description: "删除日程"
        parameters:
          type: "object"
          properties:
            schedule_id:
              type: "string"
              description: "日程 ID"
          required: ["schedule_id"]

    update_schedule:
      type: function
      function:
        name: "schedule__update_schedule"
        description: "修改日程"
        parameters:
          type: "object"
          properties:
            schedule_id:
              type: "string"
              description: "日程 ID"
            title:
              type: "string"
              description: "新标题"
            start_time:
              type: "string"
              description: "新开始时间"
            end_time:
              type: "string"
              description: "新结束时间"
            description:
              type: "string"
              description: "新描述"
          required: ["schedule_id"]

    get_schedules:
      type: function
      function:
        name: "schedule__get_schedules"
        description: "获取所有日程，或者根据特定日期 (YYYY-MM-DD) 检索"
        parameters:
          type: "object"
          properties:
            date_str:
              type: "string"
              description: "指定日期 (可选)"
          required: []

    add_cron:
      type: function
      function:
        name: "schedule__add_cron"
        description: "添加闹钟"
        parameters:
          type: "object"
          properties:
            title:
              type: "string"
              description: "闹钟标题"
            trigger_time:
              type: "string"
              description: "触发时间 (HH:MM)"
            repeat_rule:
              type: "string"
              description: "重复规则: 'none', 'everyday', 'weekly_1'...'weekly_7'"
          required: ["title", "trigger_time"]

    delete_cron:
      type: function
      function:
        name: "schedule__delete_cron"
        description: "删除闹钟"
        parameters:
          type: "object"
          properties:
            cron_id:
              type: "string"
              description: "闹钟 ID"
          required: ["cron_id"]

    update_cron:
      type: function
      function:
        name: "schedule__update_cron"
        description: "修改闹钟"
        parameters:
          type: "object"
          properties:
            cron_id:
              type: "string"
              description: "闹钟 ID"
            title:
              type: "string"
              description: "新标题"
            trigger_time:
              type: "string"
              description: "新触发时间"
            repeat_rule:
              type: "string"
              description: "新重复规则"
            active:
              type: "boolean"
              description: "是否激活"
          required: ["cron_id"]

    get_crons:
      type: function
      function:
        name: "schedule__get_crons"
        description: "获取设定的所有闹钟"
        parameters:
          type: "object"
          properties: {}
          required: []
