web:
  name: 网络搜索工具
  desc: 提供网页搜索和网页内容提取功能，结果将自动保存至 buffer 文件夹。
  dir_path: plugin_collection/web/
  functions:
    web_search:
      type: function
      function:
        name: web_search
        description: 搜索互联网内容并获取相关链接及摘要。结果将以 Markdown 格式保存至 buffer 文件夹。
        parameters:
          type: object
          properties:
            query:
              type: string
              description: 搜索关键词
            max_results:
              type: integer
              description: 返回的最大结果数量（默认为5）
          required:
          - query
    fetch_web_content:
      type: function
      function:
        name: fetch_web_content
        description: 抓取指定 URL 的网页内容。结果将以 Markdown 格式保存至 buffer 文件夹。
        parameters:
          type: object
          properties:
            url:
              type: string
              description: 网页的完整 URL
          required:
          - url
database:
  name: Database
  desc: 提供对本地数据库的检索及上下文扩展。
  dir_path: plugin_collection/database/
  functions:
    list_databases:
      type: function
      function:
        name: list_databases
        description: List all available databases on disk. Use this first if you do
          not know which database to search.
        parameters:
          type: object
          properties: {}
          required: []
    rag_search:
      type: function
      function:
        name: rag_search
        description: Perform RAG search on specific local databases. You MUST provide
          the target_dbs parameter.
        parameters:
          type: object
          properties:
            query:
              type: string
              description: The user's question or search keywords.
            target_dbs:
              type: array
              items:
                type: string
              description: List of database names to search (e.g., ['demo']). Use
                list_databases if unsure.
            top_k:
              type: integer
              description: Number of relevant text chunks to return. Default is 3.
          required:
          - query
          - target_dbs
    expand_database_context:
      type: function
      function:
        name: expand_database_context
        description: Expand the text context around a specific matched chunk in a
          database.
        parameters:
          type: object
          properties:
            db_name:
              type: string
            source:
              type: string
            center_chunk_id:
              type: integer
            window:
              type: integer
              description: Number of chunks before and after. Default 1.
          required:
          - db_name
          - source
          - center_chunk_id
schedule:
  name: 智能助手工具
  desc: 提供日程安排和闹钟管理功能。
  dir_path: plugin_collection/schedule/
  functions:
    add_schedule:
      type: function
      function:
        name: add_schedule
        description: 添加跨天/跨月的日程。时间格式推荐 YYYY-MM-DD HH:MM
        parameters:
          type: object
          properties:
            title:
              type: string
              description: 日程标题
            start_time:
              type: string
              description: 开始时间 (YYYY-MM-DD HH:MM)
            end_time:
              type: string
              description: 结束时间 (YYYY-MM-DD HH:MM)
            description:
              type: string
              description: 补充描述
          required:
          - title
          - start_time
          - end_time
    delete_schedule:
      type: function
      function:
        name: delete_schedule
        description: 删除日程
        parameters:
          type: object
          properties:
            schedule_id:
              type: string
              description: 日程 ID
          required:
          - schedule_id
    update_schedule:
      type: function
      function:
        name: update_schedule
        description: 修改日程
        parameters:
          type: object
          properties:
            schedule_id:
              type: string
              description: 日程 ID
            title:
              type: string
              description: 新标题
            start_time:
              type: string
              description: 新开始时间
            end_time:
              type: string
              description: 新结束时间
            description:
              type: string
              description: 新描述
          required:
          - schedule_id
    get_schedules:
      type: function
      function:
        name: get_schedules
        description: 获取所有日程，或者根据特定日期 (YYYY-MM-DD) 检索
        parameters:
          type: object
          properties:
            date_str:
              type: string
              description: 指定日期 (可选)
          required: []
    add_cron:
      type: function
      function:
        name: add_cron
        description: 添加闹钟
        parameters:
          type: object
          properties:
            title:
              type: string
              description: 闹钟标题
            trigger_time:
              type: string
              description: 触发时间 (HH:MM)
            repeat_rule:
              type: string
              description: '重复规则: ''none'', ''everyday'', ''weekly_1''...''weekly_7'''
          required:
          - title
          - trigger_time
    delete_cron:
      type: function
      function:
        name: delete_cron
        description: 删除闹钟
        parameters:
          type: object
          properties:
            cron_id:
              type: string
              description: 闹钟 ID
          required:
          - cron_id
    update_cron:
      type: function
      function:
        name: update_cron
        description: 修改闹钟
        parameters:
          type: object
          properties:
            cron_id:
              type: string
              description: 闹钟 ID
            title:
              type: string
              description: 新标题
            trigger_time:
              type: string
              description: 新触发时间
            repeat_rule:
              type: string
              description: 新重复规则
            active:
              type: boolean
              description: 是否激活
          required:
          - cron_id
    get_crons:
      type: function
      function:
        name: get_crons
        description: 获取设定的所有闹钟
        parameters:
          type: object
          properties: {}
          required: []
